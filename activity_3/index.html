<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 3 - Responsive Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <img src="../activity_1/OIP.png" alt="Logo" class="logo">


    <form id="loginForm">
        <label for="fullname">Name and Surname</label>
<input 
    type="text" 
    id="fullname" 
    placeholder="e.g. Mark Chindudzi"
    required
>

<label for="username">Username</label>
<input 
    type="text" 
    id="username" 
    placeholder="Enter your username"
    required
>

<label for="email">Email</label>
<input 
    type="email" 
    id="email" 
    placeholder="e.g. mark@example.com"
    required
>

<label for="password">Password</label>
<input 
    type="password" 
    id="password" 
    placeholder="Enter your password"
    required
>


        <button type="submit">Login</button>
    </form>

    <div class="output" id="output">
      <h3>Submitted Details</h3>
      <p><strong>Name:</strong> <span id="outFullname"></span></p>
      <p><strong>Username:</strong> <span id="outUsername"></span></p>
      <p><strong>Email:</strong> <span id="outEmail"></span></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
